<!DOCTYPE html>
<html>
<body>

<p id="result"></p>

<script>
let arr = [5, 2, 9, 1];

// Step 1: map (multiply each number by 2)
let mapped = arr.map(function(num) {
    return num * 2;
});

// Step 2: ascending
let ascend = mapped.sort(function(a, b) {
    return a - b;
});

// Step 3: descending
let descend = mapped.sort(function(a, b) {
    return b - a;
});

// Show result
document.getElementById("result").innerHTML =
"Mapped: " + mapped + "<br>" +
"Ascending: " + ascend + "<br>" +
"Descending: " + descend;

</script>

</body>
</html>
